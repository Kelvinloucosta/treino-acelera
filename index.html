<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0D10">
<title>ACELERA — Treino + Nutrição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0D10; --surface:#15171C; --surface2:#1C1F26;
    --line:#262A33; --line-strong:#373C48;
    --text:#EDEFF3; --muted:#949AA6; --faint:#5B616D;
    --accent:#2E90FF; --accent-bright:#62B0FF;
    --accent-soft:rgba(46,144,255,.13); --accent-line:rgba(46,144,255,.35);
    --font-display:'Barlow Semi Condensed','Arial Narrow',system-ui,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.45;padding-bottom:env(safe-area-inset-bottom);overscroll-behavior-y:none}
  .wrap{max-width:560px;margin:0 auto}

  header.bar{position:sticky;top:0;z-index:50;background:rgba(12,13,16,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:10px;padding:14px 18px 8px;padding-top:calc(14px + env(safe-area-inset-top))}
  .brand .mark{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:.06em;line-height:1;color:var(--text)}
  .brand .mark b{color:var(--accent);font-weight:800}
  .brand .eyebrow{font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase;margin-left:auto;align-self:center}
  .stats{padding:0 18px 10px;font-size:12.5px;color:var(--muted);letter-spacing:.02em;font-variant-numeric:tabular-nums}
  .stats b{color:var(--text);font-weight:600}

  .modeswitch{display:flex;gap:6px;padding:0 18px 10px}
  .modeswitch button{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:9px;border-radius:9px;cursor:pointer;transition:all .15s}
  .modeswitch button.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}

  nav.days{display:flex;padding:0 6px;gap:1px}
  nav.days button{flex:1;background:none;border:none;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:13.5px;letter-spacing:.05em;color:var(--faint);text-transform:uppercase;padding:11px 1px 12px;position:relative;transition:color .18s}
  nav.days button .dot{display:block;width:5px;height:5px;border-radius:50%;background:var(--line-strong);margin:5px auto 0;transition:background .18s,transform .18s}
  nav.days button.on{color:var(--text)}
  nav.days button.on::after{content:"";position:absolute;left:14%;right:14%;bottom:0;height:2.5px;background:var(--accent);border-radius:2px}
  nav.days button.done .dot{background:var(--accent);transform:scale(1.25)}

  .track{height:3px;background:var(--surface2);overflow:hidden}
  .track .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-bright));transition:width .3s ease}

  main{padding:18px 18px 64px}
  .dayhead{margin-bottom:6px}
  .tag{display:inline-block;font-family:var(--font-display);font-weight:700;font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px;padding:3px 11px;margin-bottom:12px}
  .dayhead h1{font-family:var(--font-display);font-weight:800;font-size:34px;line-height:.98;letter-spacing:.005em;margin-bottom:4px}
  .dayhead .sub{color:var(--muted);font-size:14px}
  .dayhead .hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--faint);margin-top:7px}
  .dayhead .hint .pl{color:var(--accent);font-size:11px}

  .meter{display:flex;align-items:flex-end;gap:12px;margin:16px 0 6px}
  .meter .read{font-family:var(--font-display);font-weight:700;font-variant-numeric:tabular-nums;line-height:.9}
  .meter .read b{font-size:30px;color:var(--text)}
  .meter .read span{font-size:18px;color:var(--faint)}
  .meter .lbl{font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
  .meter .done-flag{margin-left:auto;color:var(--accent);font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;opacity:0;transition:opacity .25s}
  .meter.full .done-flag{opacity:1}

  .daynote{background:var(--surface);border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:10px;padding:11px 13px;margin:14px 0 4px;font-size:13px;color:var(--muted);line-height:1.5}
  .daynote .pt{display:block}
  .daynote .en{display:block;margin-top:6px;color:var(--faint);font-style:italic}

  section.block{margin-top:22px}
  .sechead{display:flex;align-items:center;gap:10px;padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid var(--line)}
  .sechead .t{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)}
  .sechead .m{margin-left:auto;font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:.06em;color:var(--accent);font-style:italic;text-transform:none}

  .exh{display:flex;align-items:center;gap:12px;margin:14px 0 4px}
  .exh .name{flex:1;font-weight:600;font-size:15.5px;color:var(--text);letter-spacing:.005em}
  .exh .reps{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--accent);white-space:nowrap;font-variant-numeric:tabular-nums}
  .exdemo{flex:none;display:flex;align-items:center;justify-content:center;width:34px;height:34px;color:var(--accent);text-decoration:none;border:1px solid var(--accent-line);border-radius:8px;background:var(--accent-soft)}
  .exdemo .play{width:18px;height:18px}
  .exdemo:active{background:rgba(46,144,255,.25)}
  .exnote{font-size:12px;color:var(--faint);margin:0 0 6px;line-height:1.4}

  .item{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--line);border-radius:11px;margin-top:7px;overflow:hidden;transition:border-color .15s,background .15s}
  .item .toggle{flex:1;display:flex;align-items:center;gap:12px;padding:11px 13px;min-height:48px;background:none;border:none;cursor:pointer;color:var(--text);font:inherit;text-align:left}
  .item .toggle .box{flex:none;width:22px;height:22px;border-radius:7px;border:2px solid var(--line-strong);display:grid;place-items:center;transition:all .15s}
  .item .toggle .box svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:all .15s}
  .item .toggle .txt{font-size:14.5px;line-height:1.35}
  .item .toggle .txt .pt{display:block}
  .item .toggle .txt .en{display:block;font-size:12px;color:var(--muted);font-style:italic;margin-top:1px}
  .item.set{margin-left:14px;width:calc(100% - 14px);background:var(--surface2)}
  .item.set .toggle .txt{font-family:var(--font-display);font-weight:600;letter-spacing:.05em;font-size:15px}
  .item:active{transform:scale(.992)}
  .item.checked{border-color:var(--accent-line);background:var(--accent-soft)}
  .item.checked .toggle .box{background:var(--accent);border-color:var(--accent)}
  .item.checked .toggle .box svg{opacity:1;transform:scale(1)}
  .item.checked .toggle .txt{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}
  .demo{flex:none;display:flex;align-items:center;justify-content:center;width:48px;color:var(--accent);text-decoration:none;border-left:1px solid var(--line)}
  .demo .play{width:20px;height:20px}
  .demo:active{background:var(--accent-soft)}
  .item.checked .demo{border-left-color:var(--accent-line)}

  .meal{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin-top:14px;overflow:hidden}
  .meal .mh{display:flex;align-items:center;gap:11px;padding:12px 15px;border-bottom:1px solid var(--line);background:var(--surface2)}
  .meal .mh .ic{font-size:19px;line-height:1}
  .meal .mh .tt{display:flex;flex-direction:column;gap:1px}
  .meal .mh .tt .pt{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--text)}
  .meal .mh .tt .en{font-size:12px;color:var(--accent);font-style:italic;letter-spacing:.02em}
  .meal .ml{padding:4px 15px 10px}
  .mealitem{padding:9px 0;border-bottom:1px solid var(--line)}
  .mealitem:last-child{border-bottom:none}
  .mealitem .pt{font-size:14.5px;color:var(--text);line-height:1.35}
  .mealitem .en{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:2px;line-height:1.3}
  .meal.hungry{border-color:var(--accent-line)}
  .meal.hungry .mh{background:var(--accent-soft)}
  .meal.weekend{border-color:rgba(245,166,35,.38)}
  .meal.weekend .mh{background:rgba(245,166,35,.12)}
  .meal.weekend .mh .tt .en{color:#F5A623}

  .item .toggle:focus-visible,.exdemo:focus-visible,.demo:focus-visible,nav.days button:focus-visible,.modeswitch button:focus-visible,.clear:focus-visible,.resetweek:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px;border-radius:6px}

  .actions{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:32px}
  .clear{background:none;border:1px solid var(--line);color:var(--faint);font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:9px 18px;border-radius:999px;cursor:pointer;transition:all .15s}
  .clear:hover{color:var(--muted);border-color:var(--line-strong)}
  .resetweek{background:none;border:none;color:var(--faint);font-size:12.5px;letter-spacing:.04em;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 8px}
  .resetweek:hover{color:#FF6B6B}
  .foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:18px;letter-spacing:.04em}

  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="brand">

    <nav class="days" id="tabs"></nav>
    <div class="track"><div class="fill" id="stickyfill"></div></div>
  </header>

</div>

/* ============ ESTADO (localStorage à prova de falha) ============ */
const SKEY = "acelera.v2";
let state = {};
(function load(){ try{ const r=localStorage.getItem(SKEY); if(r) state=JSON.parse(r)||{}; }catch(e){ state={}; } })();
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(state)); }catch(e){} }

let mode = "treino";
let activeDay = PLAN[0].id;
let activeNutri = "o1";

function curDay(){ return PLAN.find(d=>d.id===activeDay); }
function leafKeys(day){
  const ks=[];
  day.sections.forEach((sec,si)=>{ sec.items.forEach((it,ii)=>{
    if(it.sets){ for(let k=1;k<=it.sets;k++) ks.push(day.id+"."+si+"."+ii+".s"+k); }
    else ks.push(day.id+"."+si+"."+ii);
  });});
  return ks;
}
function dayProgress(day){
  const ks=leafKeys(day), done=ks.filter(k=>state[k]).length;
  return {done, total:ks.length, pct: ks.length? Math.round(done/ks.length*100):0};
}
function shopKeys(){
  const ks=[];
  NUTRI.shopping.forEach((cat,ci)=>cat.items.forEach((it,ii)=>ks.push("shop."+ci+"."+ii)));
  return ks;
}
function shopProgress(){
  const ks=shopKeys(), done=ks.filter(k=>state[k]).length;
  return {done, total:ks.length, pct: ks.length? Math.round(done/ks.length*100):0};
}
function headerPct(){
  if(mode==="treino") return dayProgress(curDay()).pct;
  if(mode==="nutri" && activeNutri==="shop") return shopProgress().pct;
  return 0;
}
function demoURL(q){ return "https://www.youtube.com/results?search_query="+encodeURIComponent(q); }

const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0C0D10" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const PLAY='<svg class="play" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9.3" stroke="currentColor" stroke-width="1.6"/><path d="M10.2 8.5l5 3.5-5 3.5z" fill="currentColor"/></svg>';

function afterToggle(){
  document.getElementById("stickyfill").style.width=headerPct()+"%";
  const read=document.querySelector(".meter .read");
  if(read){
    const p = (mode==="treino") ? dayProgress(curDay()) : shopProgress();
    read.innerHTML="<b>"+p.done+"</b><span>/"+p.total+"</span>";
    const m=document.querySelector(".meter"); if(m) m.classList.toggle("full",p.total&&p.done===p.total);
  }
  renderNav();
}

function renderModeSwitch(){
  const ms=document.getElementById("modeswitch"); ms.innerHTML="";
  [["treino","Treino"],["bike","Bike"],["nutri","Nutrição"]].forEach(function(pair){
    const b=document.createElement("button");
    b.className=(mode===pair[0]?"on":""); b.textContent=pair[1];
    b.onclick=function(){ mode=pair[0]; render(); window.scrollTo({top:0}); };
    ms.appendChild(b);
  });
}

function renderNav(){
  const nav=document.getElementById("tabs"); nav.innerHTML="";
  if(mode==="bike"){ return; }
  if(mode==="treino"){
    PLAN.forEach(day=>{
      const p=dayProgress(day), b=document.createElement("button");
      b.className=(day.id===activeDay?"on ":"")+(p.total&&p.done===p.total?"done":"");
      b.innerHTML=day.short.toUpperCase()+'<span class="dot"></span>';
      b.setAttribute("aria-label",day.name);
      b.onclick=()=>{activeDay=day.id;render();window.scrollTo({top:0});};
      nav.appendChild(b);
    });
  } else {
    const opts=[["o1","Menu 1"],["o2","Menu 2"],["o3","Menu 3"],["shop","Lista"]];
    const sp=shopProgress();
    opts.forEach(function(o){
      const b=document.createElement("button");
      const done=(o[0]==="shop")&&sp.total&&sp.done===sp.total;
      b.className=(o[0]===activeNutri?"on ":"")+(done?"done":"");
      b.innerHTML=o[1].toUpperCase()+'<span class="dot"></span>';
      b.onclick=function(){ activeNutri=o[0]; render(); window.scrollTo({top:0}); };
      nav.appendChild(b);
    });
  }
}

function makeRow(key,label,isSet,q){
  const wrap=document.createElement("div");
  wrap.className="item"+(isSet?" set":"")+(state[key]?" checked":"");
  const t=document.createElement("button");
  t.className="toggle"; t.setAttribute("aria-pressed",state[key]?"true":"false");
  t.innerHTML='<span class="box">'+CHECK+'</span><span class="txt">'+label+'</span>';
  t.onclick=()=>{
    state[key]=!state[key]; if(!state[key]) delete state[key]; save();
    wrap.classList.toggle("checked");
    t.setAttribute("aria-pressed",wrap.classList.contains("checked")?"true":"false");
    afterToggle();
  };
  wrap.appendChild(t);
  if(q){
    const a=document.createElement("a");
    a.className="demo"; a.href=demoURL(q); a.target="_blank"; a.rel="noopener";
    a.setAttribute("aria-label","Ver demonstração em vídeo"); a.innerHTML=PLAY;
    wrap.appendChild(a);
  }
  return wrap;
}

/* ---------- TREINO ---------- */
function renderTreino(app){
  const day=curDay(), p=dayProgress(day);
  const head=document.createElement("div"); head.className="dayhead";
  head.innerHTML='<span class="tag">'+day.tag+'</span><h1>'+day.name+'</h1>'
    +'<p class="sub">'+day.subtitle+'</p>'
    +'<p class="hint"><span class="pl">▷</span> toque para ver como fazer cada exercício</p>';
  app.appendChild(head);

  const meter=document.createElement("div");
  meter.className="meter"+(p.total&&p.done===p.total?" full":"");
  meter.innerHTML='<div><div class="lbl">Carga do dia</div><div class="read"><b>'+p.done+'</b><span>/'+p.total+'</span></div></div><div class="done-flag">Dia completo ⚡</div>';
  app.appendChild(meter);

  if(day.note){ const n=document.createElement("div"); n.className="daynote"; n.textContent=day.note; app.appendChild(n); }

  day.sections.forEach((sec,si)=>{
    const block=document.createElement("section"); block.className="block";
    const sh=document.createElement("div"); sh.className="sechead";
    sh.innerHTML='<span class="t">'+sec.title+'</span>'+(sec.meta?'<span class="m">'+sec.meta+'</span>':"");
    block.appendChild(sh);
    sec.items.forEach((it,ii)=>{
      if(it.sets){
        const exh=document.createElement("div"); exh.className="exh";
        exh.innerHTML='<span class="name">'+it.ex+'</span>'+(it.reps?'<span class="reps">'+it.reps+'</span>':"");
        if(it.q){
          const a=document.createElement("a"); a.className="exdemo"; a.href=demoURL(it.q);
          a.target="_blank"; a.rel="noopener"; a.setAttribute("aria-label","Ver demonstração de "+it.ex); a.innerHTML=PLAY;
          exh.appendChild(a);
        }
        block.appendChild(exh);
        if(it.note){const nt=document.createElement("div"); nt.className="exnote"; nt.textContent=it.note; block.appendChild(nt);}
        for(let k=1;k<=it.sets;k++) block.appendChild(makeRow(day.id+"."+si+"."+ii+".s"+k,"Série "+k,true,null));
      }else{
        block.appendChild(makeRow(day.id+"."+si+"."+ii,it.t,false,it.q));
      }
    });
    app.appendChild(block);
  });

  const actions=document.createElement("div"); actions.className="actions";
  const clr=document.createElement("button"); clr.className="clear"; clr.textContent="Limpar marcações do dia";
  clr.onclick=()=>{ leafKeys(day).forEach(k=>delete state[k]); save(); render(); };
  const rw=document.createElement("button"); rw.className="resetweek"; rw.textContent="Resetar a semana inteira";
  rw.onclick=()=>{
    let ok=true; try{ ok=confirm("Apagar todas as marcações do treino (5 dias)?"); }catch(e){ ok=true; }
    if(!ok) return; PLAN.forEach(d=>leafKeys(d).forEach(k=>delete state[k])); save(); render();
  };
  actions.appendChild(clr); actions.appendChild(rw); app.appendChild(actions);

  const f=document.createElement("div"); f.className="foot"; f.textContent="Progresso salvo neste aparelho"; app.appendChild(f);
}

/* ---------- NUTRIÇÃO ---------- */

  const c=document.createElement("div"); c.className="meal";
  c.innerHTML='<div class="mh"><span class="ic">'+m.icon+'</span><span class="tt"><span class="pt">'+m.title.pt+'</span><span class="en">'+m.title.en+'</span></span></div>';
  const ml=document.createElement("div"); ml.className="ml";
  m.items.forEach(it=>{ const r=document.createElement("div"); r.className="mealitem"; r.innerHTML='<div class="pt">'+it.pt+'</div><div class="en">'+it.en+'</div>'; ml.appendChild(r); });
  c.appendChild(ml); return c;
}

  const c=document.createElement("div"); c.className="meal hungry";
  c.innerHTML='<div class="mh"><span class="ic">🍎</span><span class="tt"><span class="pt">Se bater a fome</span><span class="en">If you get hungry</span></span></div>';

  NUTRI.hunger.forEach(it=>{ const r=document.createElement("div"); r.className="mealitem"; r.innerHTML='<div class="pt">'+it.pt+'</div><div class="en">'+it.en+'</div>'; ml.appendChild(r); });
  c.appendChild(ml); return c;
}
function weekendCard(){
  const c=document.createElement("div"); c.className="meal weekend";

  const ml=document.createElement("div"); ml.className="ml";
  NUTRI.weekend.forEach(it=>{ const r=document.createElement("div"); r.className="mealitem"; r.innerHTML='<div class="pt">'+it.pt+'</div><div class="en">'+it.en+'</div>'; ml.appendChild(r); });
  c.appendChild(ml); return c;

function renderMealOption(app,opt){
  const head=document.createElement("div"); head.className="dayhead";
  head.innerHTML='<span class="tag">Nutrição</span><h1>'+opt.label+'</h1>'
    +'<p class="sub">Café, almoço, café da tarde e janta · Breakfast, lunch, snack &amp; dinner</p>';
  app.appendChild(head);

  const note=document.createElement("div"); note.className="daynote";
  note.innerHTML='<span class="pt">Foco em proteína e vegetais, porções moderadas — sem contar caloria. A perda de gordura vem mais da comida do que do treino. Beba bastante água. Não sou nutricionista; para algo sob medida, procure um.</span>'
    +'<span class="en">Focus on protein and vegetables, moderate portions — no calorie counting. Fat loss comes more from food than training. Drink plenty of water. I am not a dietitian; for a tailored plan, see one.</span>';
  app.appendChild(note);

  opt.meals.forEach(m=> app.appendChild(mealCard(m)));
  app.appendChild(hungerCard());
  app.appendChild(weekendCard());

  const f=document.createElement("div"); f.className="foot"; f.textContent="Pão francês com ovo no café e na tarde, do seu jeito"; app.appendChild(f);
}
function renderShopping(app){
  const head=document.createElement("div"); head.className="dayhead";
  head.innerHTML='<span class="tag">Nutrição</span><h1>Lista de compras</h1>'
    +'<p class="sub">Shopping list · marque o que já comprou · check off what you bought</p>';
  app.appendChild(head);

  const p=shopProgress();
  const meter=document.createElement("div"); meter.className="meter"+(p.total&&p.done===p.total?" full":"");
  meter.innerHTML='<div><div class="lbl">Comprado · bought</div><div class="read"><b>'+p.done+'</b><span>/'+p.total+'</span></div></div><div class="done-flag">Tudo comprado ✓</div>';

  const f=document.createElement("div"); f.className="foot"; f.textContent="Progresso salvo neste aparelho"; app.appendChild(f);
}

function infoCard(icon,title,items,cls){
  const c=document.createElement("div"); c.className="meal"+(cls?" "+cls:"");
  c.innerHTML='<div class="mh"><span class="ic">'+icon+'</span><span class="tt"><span class="pt">'+title+'</span></span></div>';
  const ml=document.createElement("div"); ml.className="ml";
  items.forEach(function(it){ const r=document.createElement("div"); r.className="mealitem"; r.innerHTML='<div class="pt">'+it+'</div>'; ml.appendChild(r); });
  c.appendChild(ml); return c;
}
function renderBike(app){
  const head=document.createElement("div"); head.className="dayhead";
  head.innerHTML='<span class="tag">Bike</span><h1>Bike em casa</h1><p class="sub">Pedal diário pra secar</p>';
  app.appendChild(head);

  const note=document.createElement("div"); note.className="daynote";
  note.textContent="Bike simples já resolve. Regra de ouro: a maioria dos dias é LEVE ou MODERADO — não precisa se matar todo dia. Pedalar quase todo dia, mesmo de leve, é o que seca no longo prazo. Em dia de perna pesada na academia, deixe o pedal levinho; vale como recuperação.";
  app.appendChild(note);

  app.appendChild(infoCard("🎚️","Como medir a intensidade",[
    "Leve — dá pra conversar tranquilo.",
    "Moderado — respiração firme, você fala só frases curtas.",
    "Forte — fica difícil falar.",
    "Bike sem marcador? Vá pela respiração e aumente a resistência se estiver fácil demais."
  ]));

  app.appendChild(infoCard("🚲","Treino do dia — versão fácil (~30 min)",[
    "5 min leve (aquecimento).",
    "20 min moderado e constante.",
    "5 min leve (desaquecimento).",
    "É essa a versão pra fazer na maioria dos dias."
  ]));

  app.appendChild(infoCard("⚡","Pra variar — intervalado (~25 min)",[
    "5 min leve.",
    "10 a 12 vezes: 1 min FORTE + 1 min leve.",
    "5 min leve.",
    "Use 1 ou 2 vezes na semana, nos dias mais tranquilos."
  ]));

  app.appendChild(infoCard("🗓️","Como encaixar com a academia",[
    "Mire 5 a 6 dias na semana e descanse pelo menos 1.",
    "Quinta (perna pesada) e logo após o jogo (segunda/terça): só leve, 15–20 min.",
    "Dias mais leves: pode usar a versão intervalada.",
    "Muito cansado ou dolorido? Pula sem culpa — descanso também seca."
  ]));

  app.appendChild(infoCard("💡","Dicas rápidas",[
    "Ajuste o banco na altura do quadril (joelho quase esticado lá embaixo).",
    "Comece com o tempo que aguentar (15–20 min) e suba aos poucos.",
    "Tenha água por perto e, se der, um ventilador.",
    "O que seca é a soma da semana + a comida, não um pedal heroico num dia só."
  ]));

  const f=document.createElement("div"); f.className="foot"; f.textContent="Constância vale mais que intensidade. Pedalou hoje? Já valeu."; app.appendChild(f);
}

function render(){
  renderModeSwitch();
  renderNav();
  document.getElementById("stickyfill").style.width=headerPct()+"%";
  const app=document.getElementById("app"); app.innerHTML="";
  if(mode==="treino"){ renderTreino(app); }
  else if(mode==="bike"){ renderBike(app); }
  else if(activeNutri==="shop"){ renderShopping(app); }
  else { renderMealOption(app, NUTRI.options.find(o=>o.id===activeNutri)); }
}

render();
